name: Sync upstream into fork

on:
  schedule:
    - cron: "40 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-fork
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main

      - name: Merge upstream/main into fork main
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork already contains upstream/main"
            exit 0
          fi

          git merge --no-edit upstream/main

      - name: Push updated fork main
        run: git push origin HEAD:main
